<app-form-dialog-box
	[formGroup]="addUserForm"
	[onSubmit]="onSubmit"
	height="h-auto"
	[icon]="isEditMode ? 'edit' : 'group_add'"
	[headerText]="isEditMode ? 'Edit User' : 'Add User'"
	[submitBtnText]="isEditMode ? 'Save' : 'Add'"
>
	<div class="flex flex-col gap-6">
		<div class="flex flex-col">
			<!-- Role -->
			<mat-form-field appearance="outline" class="w-full">
				<mat-label>Role</mat-label>
				<mat-select formControlName="role" required>
					@for (role of roles; track role) {
						<mat-option [value]="role">{{ role | titlecase }}</mat-option>
					}
				</mat-select>
			</mat-form-field>

			<!-- Email (with autocomplete in add mode) -->
			<mat-form-field appearance="outline" class="w-full">
				<mat-label>Email</mat-label>
				<input type="text" matInput formControlName="email" [required]="!isEditMode"
					[matAutocomplete]="emailAuto" />
				<mat-autocomplete #emailAuto="matAutocomplete"
					[displayWith]="displayEmail"
					(optionSelected)="onEmailSelected($event)">
					@for (user of emailSuggestions; track user.userId) {
						<mat-option [value]="user">{{ user.email }}</mat-option>
					}
				</mat-autocomplete>
			</mat-form-field>

			@if (!existingUser) {
			<!-- Name fields -->
			<div class="flex gap-4">
				<mat-form-field appearance="outline" class="w-1/2">
					<mat-label>First Name</mat-label>
					<input type="text" matInput formControlName="firstName" [required]="!isEditMode" />
				</mat-form-field>

				<mat-form-field appearance="outline" class="w-1/2">
					<mat-label>Last Name</mat-label>
					<input type="text" matInput formControlName="lastName" [required]="!isEditMode" />
				</mat-form-field>
			</div>
			}

			@if (!isEditMode && !existingUser) {
			<!-- Password -->
			<div class="flex flex-col gap-0">
				<mat-form-field appearance="outline" class="w-full !m-0">
					<mat-label>Password</mat-label>
					<input [type]="hidePassword ? 'password': 'text'" matInput formControlName="password" required />
					<button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
						<mat-icon class="material-symbols-outlined">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
					</button>
				</mat-form-field>
				<div class="mat-body-small text-on-surface-variant select-none">
					<span>Share this email and password to login</span>
				</div>
			</div>
			}
		</div>
	</div>
</app-form-dialog-box>
