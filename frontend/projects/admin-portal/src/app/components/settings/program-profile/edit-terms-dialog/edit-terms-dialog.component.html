<mat-dialog-content class="rounded-[5px] p-6 bg-surface-container-lowest info-dialog-shadow h-[651px]">
	<form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-8 h-full">
		<!-- Header -->
		<div class="flex justify-between">
			<div class="flex flex-col gap-2">
				<div class="size-6">
					<mat-icon class="text-on-surface material-symbols-outlined">edit</mat-icon>
				</div>
				<div class="text-on-surface mat-title-large">
					<span>Edit Terms & Conditions</span>
				</div>
			</div>
			<button type="button" mat-icon-button class="cursor-pointer" (click)="dialogRef.close()">
				<mat-icon>close</mat-icon>
			</button>
		</div>

		<!-- Editor + Preview -->
		<div class="flex flex-row gap-6 flex-1 min-h-0">
			<!-- Editor side -->
			<div class="flex-1 flex flex-col gap-4 min-h-0">
				<div class="flex flex-row items-center gap-4">
					<span class="mat-body-medium text-on-surface-variant">Headline</span>
					<mat-form-field appearance="outline" class="flex-1 headline-field">
						<input matInput value="Agreement to terms" disabled />
					</mat-form-field>
				</div>

				<quill-editor
					formControlName="termsAndConditions"
					[modules]="quillModules"
					[placeholder]="'Terms & Conditions goes here'"
					class="flex-1 flex flex-col min-h-0 quill-fill"
				></quill-editor>
			</div>

			<!-- Preview side -->
			<div class="flex-1 flex flex-col gap-[10px] min-h-0">
				<div class="mat-body-medium text-on-surface-variant">Preview</div>
				<div class="flex-1 rounded-[5px] border border-outline-variant bg-surface-container-lowest overflow-y-auto">
					<app-markdown-content [content]="form.value.termsAndConditions || ''" />
				</div>
			</div>
		</div>

		<!-- Actions -->
		<div class="h-10">
			<mat-dialog-actions class="!p-0 flex justify-end gap-2">
				<button matRipple mat-button mat-dialog-close type="button"
					class="w-auto min-w-[70px] text-primary mat-label-large cursor-pointer">Cancel</button>

				@if (!isLoading) {
					<button mat-flat-button type="submit"
						class="w-auto min-w-[93px] rounded-full bg-primary text-on-primary mat-label-large cursor-pointer">
						Save
					</button>
				} @else {
					<button mat-flat-button type="button" disabled
						class="w-auto min-w-[93px] rounded-full bg-primary text-on-primary mat-label-large cursor-pointer flex items-center justify-center gap-2">
						<mat-spinner [diameter]="16" class="button-spinner" strokeWidth="2"></mat-spinner>
					</button>
				}
			</mat-dialog-actions>
		</div>
	</form>
</mat-dialog-content>
